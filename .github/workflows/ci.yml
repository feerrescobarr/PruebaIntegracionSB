name: CI

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Practica6Alumnos


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Give execution permission to Maven wrapper
        run: chmod +x ./mvnw

      - name: Compile project
        run: ./mvnw compile --no-transfer-progress

      - name: Run unit and integration tests
        run: ./mvnw verify --no-transfer-progress

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Report
          path: "Practica6Alumnos/target/*-reports/*.xml"
          reporter: java-junit
          fail-on-empty: false

      - name: Upload XML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xml-test-reports
          path: Practica6Alumnos/target/*-reports/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: Practica6Alumnos/target/site/jacoco/
          retention-days: 7
          if-no-files-found: warn